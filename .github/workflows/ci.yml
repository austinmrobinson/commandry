name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  checks:
    name: Build, lint, and test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Next.js 16 requires Node >= 20.9.0
        node-version: [20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test
